# wrangler.toml
name = 'super-octo-broccoli'
main = "worker/index.js"
compatibility_date = "2026-07-15"
workers_dev = true
minify = true

[vars]
APP_URL = "https://arystal010.github.io/super-octo-broccoli"
# Add your OpenRouter API key as a secret (never put it here):
# wrangler secret put OPENROUTER_API_KEY
# Add your Firecrawl API key as a secret (never put it here):
# wrangler secret put FIRECRAWL_API_KEY
